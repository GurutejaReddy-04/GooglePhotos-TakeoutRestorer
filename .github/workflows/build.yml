name: Build Cross-Platform Executables

on:
  release:
    types: [created]
  workflow_dispatch:  # Allow manual triggering from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: GooglePhotosTakeoutRestorer-Windows
            asset_name: GooglePhotosTakeoutRestorer-Windows.zip
          - os: macos-latest
            artifact_name: GooglePhotosTakeoutRestorer-macOS
            asset_name: GooglePhotosTakeoutRestorer-macOS.zip
          - os: ubuntu-latest
            artifact_name: GooglePhotosTakeoutRestorer-Linux
            asset_name: GooglePhotosTakeoutRestorer-Linux.zip

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller GooglePhotosTakeoutRestorer.spec --clean -y

    - name: Zip the build folder (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Compress-Archive -Path dist\GooglePhotosTakeoutRestorer -DestinationPath ${{ matrix.asset_name }}

    - name: Zip the build folder (macOS & Linux)
      if: matrix.os != 'windows-latest'
      run: |
        zip -r ${{ matrix.asset_name }} dist/GooglePhotosTakeoutRestorer

    - name: Upload artifact to workflow run
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.asset_name }}

    - name: Upload artifact to release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
