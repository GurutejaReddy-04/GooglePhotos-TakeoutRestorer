name: Build Windows Executable

on:
  release:
    types: [created]
  workflow_dispatch:  # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller GooglePhotosTakeoutFixer.spec --clean -y

    - name: Zip the build folder
      run: |
        Compress-Archive -Path dist\GooglePhotosTakeoutFixer -DestinationPath GooglePhotosTakeoutFixer-Windows.zip

    - name: Upload artifact to workflow run
      uses: actions/upload-artifact@v4
      with:
        name: GooglePhotosTakeoutFixer-Windows
        path: GooglePhotosTakeoutFixer-Windows.zip

    - name: Upload artifact to release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: GooglePhotosTakeoutFixer-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
